services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: konexzero
      POSTGRES_PASSWORD: konexzero
      POSTGRES_DB: konexzero_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: bundle exec rails server -p 3000 -b 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://konexzero:konexzero@postgres:5432/konexzero_development
      REDIS_URL: redis://redis:6379/0
      CLOUDFLARE_APP_ID: ${CLOUDFLARE_APP_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID}
      CLOUDFLARE_TURN_KEY_API_TOKEN: ${CLOUDFLARE_TURN_KEY_API_TOKEN}

  sidekiq:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://konexzero:konexzero@postgres:5432/konexzero_development
      REDIS_URL: redis://redis:6379/0
      CLOUDFLARE_APP_ID: ${CLOUDFLARE_APP_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID}
      CLOUDFLARE_TURN_KEY_API_TOKEN: ${CLOUDFLARE_TURN_KEY_API_TOKEN}

  anycable_rpc:
    build: .
    command: bundle exec anycable
    ports:
      - "50051:50051"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://konexzero:konexzero@postgres:5432/konexzero_development
      REDIS_URL: redis://redis:6379/0
      ANYCABLE_RPC_HOST: "0.0.0.0:50051"

  anycable_go:
    image: anycable/anycable-go:1.5
    ports:
      - "8080:8080"
    depends_on:
      - anycable_rpc
      - redis
    environment:
      ANYCABLE_HOST: "0.0.0.0"
      ANYCABLE_PORT: "8080"
      ANYCABLE_RPC_HOST: "anycable_rpc:50051"
      ANYCABLE_REDIS_URL: redis://redis:6379/0
      ANYCABLE_HEADERS: "cookie,x-api-key,x-app-id"

volumes:
  postgres_data:
  redis_data:
